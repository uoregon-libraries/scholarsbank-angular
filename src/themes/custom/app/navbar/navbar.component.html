<div class="navbar-inner-container w-100 h-100" [class.container]="(isMobile$ | async) !== true">
  <ng-container *ngIf="(isMobile$ | async) && (isAuthenticated$ | async)">
    <ds-user-menu [inExpandableNavbar]="true"></ds-user-menu>
  </ng-container>
  <div class="navbar-nav h-100 align-items-md-stretch gapx-3" role="menubar" id="main-site-navigation" [ngClass]="(isMobile$ | async) ? 'navbar-nav-mobile' : 'navbar-nav-desktop'">
    <ng-container *ngFor="let section of (sections | async)">
      <ng-container *ngIf="section.id!=='statistics_site'">
        <ng-container *ngComponentOutlet="(sectionMap$ | async).get(section.id)?.component; injector: (sectionMap$ | async).get(section.id)?.injector;"></ng-container>
      </ng-container>
    </ng-container>
    <ng-container *ngFor="let section of (sections | async)">
      <ng-container *ngIf="section.id==='statistics_site'">
        <ng-container *ngComponentOutlet="(sectionMap$ | async).get(section.id)?.component; injector: (sectionMap$ | async).get(section.id)?.injector;"></ng-container>
      </ng-container>
    </ng-container>
  </div>
  <ds-search-navbar class="navbar-collapsed ml-auto"></ds-search-navbar>
  <ds-lang-switch class="navbar-collapsed"></ds-lang-switch>
  <ds-context-help-toggle class="navbar-collapsed"></ds-context-help-toggle>
  <ds-auth-nav-menu class="navbar-collapsed"></ds-auth-nav-menu>
  <ds-impersonate-navbar class="navbar-collapsed"></ds-impersonate-navbar>   
</div>
