<div *ngIf="!showDiscoverFilters" id="home-container" class="container">
    <ng-container *ngTemplateOutlet="homeContent"></ng-container>
</div>
  <!-- <ds-suggestions-popup></ds-suggestions-popup> -->
  
  <ng-template #homeContent>
    <ng-container *ngIf="(site$ | async) as site">
      <ds-view-tracker [object]="site"></ds-view-tracker>
    </ng-container>
    <div class="background-image-container">
      <div class="background-image">
          <div class="overlay">
              <h1 class="united-Serif-regular">Search Scholars' Bank</h1>
                <div class="search-container">
                    <ds-search-form id="home-page-search-form" [inPlaceSearch]="false" [homePlaceholder]="''"
                                          [searchPlaceholder]="'home.search-form.placeholder' | translate">
                    </ds-search-form>
                </div>
            </div>
        </div>
    </div>
    <ds-themed-top-level-community-group></ds-themed-top-level-community-group>
    <!-- <ds-recent-item-list *ngIf="recentSubmissionspageSize>0"></ds-recent-item-list> -->
  </ng-template>
